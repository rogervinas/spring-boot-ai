<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐 ROGERVINAS travel agency</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
        header { background: #1a1a2e; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
        header h1 { font-size: 18px; font-weight: 600; }
        .config-bar { background: #fff; padding: 12px 24px; border-bottom: 1px solid #ddd; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .config-bar label { font-size: 13px; font-weight: 600; color: #555; }
        .config-bar input { padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; width: 120px; }
        .chat-container { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; word-wrap: break-word; }
        .message.user { align-self: flex-end; background: #1a1a2e; color: #fff; border-bottom-right-radius: 4px; }
        .message.assistant { align-self: flex-start; background: #fff; color: #333; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }
        .message.error { align-self: center; background: #fee; color: #c00; border: 1px solid #fcc; font-size: 13px; }
        .message.assistant .msg-content h1, .message.assistant .msg-content h2, .message.assistant .msg-content h3 { margin: 8px 0 4px; }
        .message.assistant .msg-content ul, .message.assistant .msg-content ol { margin-left: 20px; }
        .message.assistant .msg-content p { margin: 4px 0; }
        .message.assistant .msg-content code { background: #f0f0f0; padding: 1px 4px; border-radius: 3px; font-size: 13px; }
        .message.assistant .msg-content pre { background: #f0f0f0; padding: 8px; border-radius: 6px; overflow-x: auto; margin: 4px 0; }
        .message.assistant .msg-content table { border-collapse: collapse; margin: 8px 0; width: 100%; }
        .message.assistant .msg-content th, .message.assistant .msg-content td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; font-size: 13px; }
        .message.assistant .msg-content th { background: #f5f5f5; font-weight: 600; }
        .typing { align-self: flex-start; background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 12px 16px; font-size: 14px; color: #999; }
        .input-bar { background: #fff; border-top: 1px solid #ddd; padding: 16px 24px; display: flex; gap: 12px; }
        .input-bar input { flex: 1; padding: 10px 16px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; outline: none; }
        .input-bar input:focus { border-color: #1a1a2e; }
        .input-bar button { padding: 10px 24px; background: #1a1a2e; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
        .input-bar button:disabled { opacity: 0.5; cursor: not-allowed; }
        .input-bar button:hover:not(:disabled) { background: #16213e; }
    </style>
</head>
<body>
    <header>
        <h1>🌐 ROGERVINAS travel agency</h1>
    </header>

    <div class="config-bar">
        <label>Chat ID</label>
        <input type="text" id="chatId" value="1">
    </div>

    <div class="chat-container" id="chat"></div>

    <div class="input-bar">
        <input type="text" id="question" placeholder="Ask about cities, weather, or book accommodation..." autofocus>
        <button id="sendBtn" onclick="send()">Send</button>
    </div>

    <script>
        const chat = document.getElementById("chat");
        const questionInput = document.getElementById("question");
        const sendBtn = document.getElementById("sendBtn");

        questionInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !sendBtn.disabled) send();
        });

        function addMessage(role, content) {
            const div = document.createElement("div");
            div.className = "message " + role;
            if (role === "assistant") {
                const inner = document.createElement("div");
                inner.className = "msg-content";
                inner.innerHTML = renderMarkdown(content);
                div.appendChild(inner);
            } else {
                div.textContent = content;
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function renderMarkdown(text) {
            text = text.replace(/^-{3,}$/gm, "");
            text = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

            // Extract and render tables
            text = text.replace(/((\|.+\|\n?)+)/g, (match) => {
                const rows = match.trim().split("\n").filter(r => r.trim());
                if (rows.length < 2) return match;
                const parseRow = (row) => row.split("|").slice(1, -1).map(c => c.trim());
                const headers = parseRow(rows[0]);
                const isSeparator = (row) => /^[\s|:-]+$/.test(row.trim());
                const startIdx = isSeparator(rows[1]) ? 2 : 1;
                let html = "<table><thead><tr>" + headers.map(h => `<th>${h}</th>`).join("") + "</tr></thead><tbody>";
                for (let i = startIdx; i < rows.length; i++) {
                    const cells = parseRow(rows[i]);
                    html += "<tr>" + cells.map(c => `<td>${c}</td>`).join("") + "</tr>";
                }
                html += "</tbody></table>";
                return html;
            });

            return text
                .replace(/```([\s\S]*?)```/g, "<pre><code>$1</code></pre>")
                .replace(/`([^`]+)`/g, "<code>$1</code>")
                .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
                .replace(/\*(.+?)\*/g, "<em>$1</em>")
                .replace(/^###### (.+)$/gm, "<h6>$1</h6>")
                .replace(/^##### (.+)$/gm, "<h5>$1</h5>")
                .replace(/^#### (.+)$/gm, "<h4>$1</h4>")
                .replace(/^### (.+)$/gm, "<h3>$1</h3>")
                .replace(/^## (.+)$/gm, "<h2>$1</h2>")
                .replace(/^# (.+)$/gm, "<h1>$1</h1>")
                .replace(/^- (.+)$/gm, "<li>$1</li>")
                .replace(/(<li>.*<\/li>)/s, "<ul>$1</ul>")
                .replace(/\n/g, "<br>");
        }

        async function send() {
            const question = questionInput.value.trim();
            if (!question) return;

            const chatId = document.getElementById("chatId").value.trim();

            addMessage("user", question);
            questionInput.value = "";
            sendBtn.disabled = true;

            const typing = document.createElement("div");
            typing.className = "typing";
            typing.textContent = "Thinking...";
            chat.appendChild(typing);
            chat.scrollTop = chat.scrollHeight;

            try {
                const params = new URLSearchParams({ question });
                const res = await fetch(`/${chatId}/chat`, { method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: params });
                typing.remove();
                if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
                const text = await res.text();
                addMessage("assistant", text);
            } catch (e) {
                typing.remove();
                addMessage("error", "Error: " + e.message);
            } finally {
                sendBtn.disabled = false;
                questionInput.focus();
            }
        }
    </script>
</body>
</html>
