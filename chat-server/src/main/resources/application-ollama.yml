spring:
  # TODO GoogleGenAiEmbeddingConnectionAutoConfiguration has no @ConditionalOnProperty guard,
  # so it activates whenever the Google GenAI classes are on the classpath.
  # This exclusion can be removed if only Ollama dependencies are added; it's needed
  # here because this PoC supports multiple model providers.
  autoconfigure:
    exclude:
      - org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingConnectionAutoConfiguration
  ai:
    model:
      embedding: "ollama"
      chat: "ollama"
    ollama:
      base-url: "http://localhost:11434"
      init:
        pull-model-strategy: "when_missing"
      chat:
        options:
          model: "llama3.1:8b"
      embedding:
        options:
          model: "nomic-embed-text"
    vectorstore:
      pgvector:
        table-name: "vector_store_ollama"
        dimensions: 768
        initialize-schema: true
