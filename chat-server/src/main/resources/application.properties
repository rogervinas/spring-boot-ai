# TODO We use .properties instead of .yml because YAML cannot have both
# spring.ai.model.embedding (scalar) and spring.ai.model.embedding.text (nested)
# at the same time, and both are needed to guard different auto-configurations.
# See https://github.com/spring-projects/spring-ai/issues/4240

spring.application.name=chat-server

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Disable all model auto-configurations by default.
# Each profile (ollama, gemini, bedrock) overrides the relevant properties.
spring.ai.model.chat=none
spring.ai.model.embedding=none
spring.ai.model.embedding.text=none

spring.ai.mcp.client.toolcallback.enabled=true
spring.ai.mcp.client.sse.connections.booking-tool.url=http://localhost:8081

server.port=8080

logging.level.org.springframework.ai.chat.client.advisor=INFO
