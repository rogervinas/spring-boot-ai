spring:
  ai:
    model:
      chat: "google-genai"
      embedding:
        text: "google-genai"
    # Retry with backoff to handle Gemini free-tier rate limits (5 RPM chat, 100 RPM embedding)
    retry:
      max-attempts: 5
      exponential-backoff:
        initial-interval: 60s
        multiplier: 2
        max-interval: 180s
    google:
      genai:
        api-key: "${GOOGLE_API_KEY}"
        project-id: "xxx"
        chat:
          options:
            model: "gemini-2.5-flash"
            temperature: 0.7
        embedding:
          api-key: "${GOOGLE_API_KEY}"
          project-id: "xxx"
          text:
            options:
              model: "gemini-embedding-001"
              dimensions: 768
    vectorstore:
      pgvector:
        table-name: "vector_store_gemini"
        dimensions: 768
        initialize-schema: true